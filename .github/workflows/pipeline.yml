name: SA Housing Market — DE Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # Daily 06:00 UTC (production run)

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ── Job 1: Lint & Test ────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black

      - name: Lint with flake8
        run: flake8 pipelines/ spark/ data_quality/ dashboard/ --max-line-length 110 --ignore E501,W503

      - name: Format check with black
        run: black --check pipelines/ spark/ data_quality/ dashboard/

      - name: Run unit tests
        run: pytest tests/ -v --cov=pipelines --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  # ── Job 2: Data Quality Gate ──────────────────────────────────────────────
  data-quality:
    name: Data Quality Gate
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download sample data
        run: |
          mkdir -p data/raw
          # In production this would pull from S3
          echo "Downloading sample for CI ..."

      - name: Run data quality checks
        run: python data_quality/quality_checks.py

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: data_quality/reports/

  # ── Job 3: ETL Pipeline ───────────────────────────────────────────────────
  etl-pipeline:
    name: ETL Pipeline Run
    runs-on: ubuntu-latest
    needs: data-quality
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL pipeline
        run: python pipelines/etl_pipeline.py

      - name: Run data modeling
        run: python pipelines/data_modeling.py

      - name: Upload warehouse artifact
        uses: actions/upload-artifact@v4
        with:
          name: warehouse
          path: data/warehouse/

  # ── Job 4: dbt Run ────────────────────────────────────────────────────────
  dbt-run:
    name: dbt Models & Tests
    runs-on: ubuntu-latest
    needs: etl-pipeline
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dbt
        run: pip install dbt-sqlite

      - name: Download warehouse
        uses: actions/download-artifact@v4
        with:
          name: warehouse
          path: data/warehouse/

      - name: dbt debug
        working-directory: dbt_project
        run: dbt debug

      - name: dbt run
        working-directory: dbt_project
        run: dbt run

      - name: dbt test
        working-directory: dbt_project
        run: dbt test

      - name: dbt docs generate
        working-directory: dbt_project
        run: dbt docs generate

      - name: Upload dbt docs
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: dbt_project/target/

  # ── Job 5: Build Dashboard ────────────────────────────────────────────────
  build-dashboard:
    name: Generate Dashboard
    runs-on: ubuntu-latest
    needs: dbt-run
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download warehouse
        uses: actions/download-artifact@v4
        with:
          name: warehouse
          path: data/warehouse/

      - name: Generate HTML dashboard
        run: python dashboard/generate_dashboard.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
